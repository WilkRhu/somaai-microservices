version: '3.8'

services:
  delivery-service:
    build: .
    ports:
      - "3012:3012"
    environment:
      NODE_ENV: development
      PORT: 3012
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: password
      DB_DATABASE: delivery_db
      DB_SYNCHRONIZE: "true"
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: delivery-service
    depends_on:
      - mysql
      - kafka
    networks:
      - somaai-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: delivery_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - somaai-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    networks:
      - somaai-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - somaai-network

volumes:
  mysql_data:

networks:
  somaai-network:
    driver: bridge

services:
  # ==================== INFRASTRUCTURE ====================
  
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - somaai-network

  kafka:
    image: wurstmeister/kafka:2.11-1.1.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: localhost
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "user.created,user.updated,user.deleted,auth.token.revoked,auth.login.success,auth.login.failed,auth.registration.success,order.created"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - somaai-network

  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: somaai_master
      MYSQL_USER: somaai
      MYSQL_PASSWORD: somaai_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
    networks:
      - somaai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - somaai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_master_data:
  redis_data:

networks:
  somaai-network:
    driver: bridge

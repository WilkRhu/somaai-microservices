services:
  # ==================== INFRASTRUCTURE ====================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports: 
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - somaai-network
  
  kafka: 
    image: confluentinc/cp-kafka:7.5.0
    ports: 
      - "9092:9092"
    environment: 
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - somaai-network

  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: somaai_master
      MYSQL_USER: somaai
      MYSQL_PASSWORD: somaai_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
    networks:
      - somaai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - somaai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== MICROSERVICES ====================

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: production
      PORT: 3010
      DATABASE_URL: mysql://somaai:somaai_password@mysql-master:3306/somaai_master
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator-service
    ports:
      - "3009:3009"
    environment:
      NODE_ENV: production
      PORT: 3009
      DATABASE_URL: mysql://somaai:somaai_password@mysql-master:3306/somaai_master
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      AUTH_SERVICE_URL: http://auth:3010
      BUSINESS_SERVICE_URL: http://business:3011
      SALES_SERVICE_URL: http://sales:3001
      INVENTORY_SERVICE_URL: http://inventory:3002
      DELIVERY_SERVICE_URL: http://delivery:3003
      SUPPLIERS_SERVICE_URL: http://suppliers:3004
      OFFERS_SERVICE_URL: http://offers:3005
      FISCAL_SERVICE_URL: http://fiscal:3006
      OCR_SERVICE_URL: http://ocr:3007
      PAYMENTS_SERVICE_URL: http://payments:3008
      MONOLITH_SERVICE_URL: http://monolith:3000
      EMAIL_SERVICE_URL: http://email:3012
      UPLOAD_SERVICE_URL: http://upload:3008
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  business:
    build:
      context: ./services/business
      dockerfile: Dockerfile
    container_name: business-service
    ports:
      - "3011:3011"
    environment:
      NODE_ENV: production
      PORT: 3011
      DB_HOST: mysql-master
      DB_PORT: 3306
      DB_USERNAME: somaai
      DB_PASSWORD: somaai_password
      DB_DATABASE: somaai_master
      DB_LOGGING: "false"
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: business-service
      JWT_SECRET: your-secret-key-here
      JWT_EXPIRATION: 24h
      AUTH_SERVICE_URL: http://auth:3010
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  sales:
    build:
      context: ./services/sales
      dockerfile: Dockerfile
    container_name: sales-service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://somaai:somaai_password@mysql-master:3306/somaai_master
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  inventory:
    build:
      context: ./services/inventory
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: mysql://somaai:somaai_password@mysql-master:3306/somaai_master
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  delivery:
    build:
      context: ./services/delivery
      dockerfile: Dockerfile
    container_name: delivery-service
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: mysql://somaai:somaai_password@mysql-master:3306/somaai_master
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  suppliers:
    build:
      context: ./services/suppliers
      dockerfile: Dockerfile
    container_name: suppliers-service
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: mysql://somaai:somaai_password@mysql-master:3306/somaai_master
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  offers:
    build:
      context: ./services/offers
      dockerfile: Dockerfile
    container_name: offers-service
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: mysql://somaai:somaai_password@mysql-master:3306/somaai_master
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  fiscal:
    build:
      context: ./services/fiscal
      dockerfile: Dockerfile
    container_name: fiscal-service
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: production
      PORT: 3006
      DATABASE_URL: mysql://somaai:somaai_password@mysql-master:3306/somaai_master
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  ocr:
    build:
      context: ./services/ocr
      dockerfile: Dockerfile
    container_name: ocr-service
    ports:
      - "3007:3007"
    environment:
      NODE_ENV: production
      PORT: 3007
      DATABASE_URL: mysql://somaai:somaai_password@mysql-master:3306/somaai_master
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  payments:
    build:
      context: ./services/payments
      dockerfile: Dockerfile
    container_name: payments-service
    ports:
      - "3008:3008"
    environment:
      NODE_ENV: production
      PORT: 3008
      DATABASE_URL: mysql://somaai:somaai_password@mysql-master:3306/somaai_master
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  monolith:
    build:
      context: ./services/monolith
      dockerfile: Dockerfile
    container_name: monolith-service
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql-master
      DB_PORT: 3306
      DB_USERNAME: somaai
      DB_PASSWORD: somaai_password
      DB_DATABASE: somaai_master
      DB_SYNCHRONIZE: "true"
      DB_LOGGING: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      AUTH_SERVICE_URL: http://auth:3010
      ORCHESTRATOR_SERVICE_URL: http://orchestrator:3009
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRATION: 3600
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  email:
    build:
      context: ./services/email
      dockerfile: Dockerfile
    container_name: email-service
    ports:
      - "3012:3012"
    environment:
      NODE_ENV: production
      PORT: 3012
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      EMAIL_PROVIDER: sendgrid
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-your-sendgrid-api-key}
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-somaai@wilkcaetano.com.br}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-somaai@wilkcaetano.com.br}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-SomaAI}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - somaai-network
    restart: unless-stopped

  upload:
    build:
      context: ./services/upload
      dockerfile: Dockerfile
    container_name: upload-service
    ports:
      - "3013:3008"
    environment:
      NODE_ENV: production
      PORT: 3008
      UPLOAD_PROVIDER: S3
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-somaaiuploads}
      FTP_HOST: ${FTP_HOST:-ftp.wilkcaetano.com.br}
      FTP_PORT: 21
      FTP_USER: ${FTP_USER}
      FTP_PASS: ${FTP_PASS}
      FTP_SECURE: "false"
      FTP_BASE_PATH: /public_html/somaai/uploads
    networks:
      - somaai-network
    restart: unless-stopped

volumes:
  mysql_master_data:
  redis_data:

networks:
  somaai-network:
    driver: bridge

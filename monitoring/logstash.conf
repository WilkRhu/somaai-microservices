input {
  tcp {
    port => 5000
    codec => json
  }
  
  udp {
    port => 5000
    codec => json
  }
  
  file {
    path => "/var/log/somaai/sales/*.log"
    start_position => "beginning"
    tags => ["sales"]
  }
  
  file {
    path => "/var/log/somaai/inventory/*.log"
    start_position => "beginning"
    tags => ["inventory"]
  }
  
  file {
    path => "/var/log/somaai/delivery/*.log"
    start_position => "beginning"
    tags => ["delivery"]
  }
  
  file {
    path => "/var/log/somaai/suppliers/*.log"
    start_position => "beginning"
    tags => ["suppliers"]
  }
  
  file {
    path => "/var/log/somaai/offers/*.log"
    start_position => "beginning"
    tags => ["offers"]
  }
}

filter {
  if [type] == "json" {
    json {
      source => "message"
    }
  }
  
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:service}\] %{LOGLEVEL:level} %{GREEDYDATA:message}"
    }
  }
  
  if "_grokparsefailure" in [tags] {
    mutate {
      remove_tag => ["_grokparsefailure"]
    }
  }
  
  mutate {
    add_field => {
      "[@metadata][index_name]" => "somaai-logs-%{+YYYY.MM.dd}"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index_name]}"
    document_type => "_doc"
  }
  
  stdout {
    codec => rubydebug
  }
}
